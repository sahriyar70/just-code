<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>

    <style>
body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
    padding: 20px;
}

/* main card */
.card {
    width: 250px;
    background: #ffffff;
    border-radius: 15px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    text-align: center;
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-5px);
}

/* profile image container */
.profile {
    width: 100px;
    height: 100px;
    margin: 0 auto 15px;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid #4f46e5;
}

/* profile image */
.profile img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* name */
.card h2 {
    margin: 10px 0 5px;
    font-size: 20px;
}

/* job */
.card h3 {
    margin: 5px 0;
    color: #6b7280;
    font-size: 16px;
}

/* info */
.card p {
    font-size: 14px;
    color: #374151;
    margin-top: 10px;
}

body {
    font-family: Arial, sans-serif;
    background: #f3f4f6;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* form container */
form {
    background: #ffffff;
    padding: 25px;
    border-radius: 15px;
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    width: 300px;
    display: flex;
    flex-direction: column;
    gap: 12px;
}

/* input fields */
form input[type="text"] {
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 14px;
    outline: none;
    transition: 0.2s;
}

/* focus effect */
form input[type="text"]:focus {
    border-color: #4f46e5;
    box-shadow: 0 0 5px rgba(79, 70, 229, 0.3);
}

/* submit button */
form input[type="submit"] {
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #4f46e5;
    color: #fff;
    font-size: 15px;
    cursor: pointer;
    transition: 0.3s;
}

/* hover effect */
form input[type="submit"]:hover {
    background: #3730a3;
}

    </style>
</head>
<body>

    <main id="main">
       <form action="">
         <input type="text" placeholder="Enter your profile photo URL" >
        <input type="text" placeholder="Enter your name" >
       <input type="text" placeholder="Enter your job title" >
       <input type="text" placeholder="Enter your info" >
       <input type="submit">
       </form>


    </main>
    

    <script src="card.js" ></script>
</body>
</html>
